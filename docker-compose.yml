services:
  mybot:
    image: docker.io/yexi12345/mybotdev:latest
    container_name: mybot
    restart: unless-stopped
    ports:
      - "6055:6055"
    environment:
      - TZ=Asia/Shanghai 
      - PYTHONUNBUFFERED=1
    volumes:
      - ./logs:/app/logs
      - ./plugins_config:/app/plugins_config
      - ./setting.toml:/app/setting.toml
      - ./data:/app/data
      - mybot-venv:/app/.venv
      - mybot-uv-cache:/app/.uv-cache

volumes:
  mybot-venv:
  mybot-uv-cache:

    
